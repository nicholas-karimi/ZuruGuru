{% extends "base.html" %}

{% block body %}
<div class="d-flex" style="min-height: 100vh">
  <!-- Sidebar -->
  <aside
    class="d-flex flex-column p-3"
    style="
      width: 260px;
      background: radial-gradient(circle at top, #101827, #020617);
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    "
  >
    <div class="d-flex align-items-center mb-4">
      <div
        class="rounded-circle d-flex align-items-center justify-content-center me-2"
        style="
          width: 36px;
          height: 36px;
          background: linear-gradient(
            135deg,
            var(--konza-red),
            var(--konza-green)
          );
        "
      >
        <span class="fw-bold">Z</span>
      </div>
      <div>
        <div class="fw-semibold">ZuruGuru</div>
        <small class="text-muted">Konza Command</small>
      </div>
    </div>

    <nav class="nav flex-column nav-pills small mb-auto">
      <a
        class="nav-link mb-1 {% if request.url.path.startswith('/admin/pois') %}active{% endif %}"
        href="{{ url_for('admin_pois') }}"
      >
        <span class="material-symbols-outlined me-1">location_on</span> POIs &amp;
        Insights
      </a>
      <a
        class="nav-link mb-1 {% if request.url.path.startswith('/admin/security') %}active{% endif %}"
        href="{{ url_for('admin_security') }}"
      >
        <span class="material-symbols-outlined me-1">shield</span> Security
        LiveView
      </a>
    </nav>

    <div class="mt-3 small text-muted">
      <div>Konza Technopolis</div>
      <div>Smart City Ops • v0.1</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-grow-1 p-3 p-md-4 bg-dark-subtle bg-gradient">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% endblock %}
