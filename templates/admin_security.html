{% extends "admin_base.html" %}

{% block admin_content %}
<div class="container-fluid">
  <div class="row g-3">
    <div class="col-12 col-lg-8">
      <div class="glass-card p-2 h-100">
        <div
          class="d-flex justify-content-between align-items-center mb-2 px-2"
        >
          <h5 class="mb-0">Live Visitor Map</h5>
          <span class="badge bg-success-subtle text-konza-green small"
            >WebSocket: <span id="ws-status">connecting…</span></span
          >
        </div>
        <div
          id="security-map"
          style="height: 70vh; border-radius: 1rem; overflow: hidden"
        ></div>
      </div>
    </div>
    <div class="col-12 col-lg-4">
      <div class="bg-success p-3 h-100 d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="mb-0">SOS Alerts</h5>
          <span class="badge bg-danger text-light">Live</span>
        </div>
        <div
          id="sos-list"
          class="flex-grow-1 overflow-auto"
          style="max-height: 70vh"
        ></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='/js/admin.js') }}"></script>
{% endblock %}
